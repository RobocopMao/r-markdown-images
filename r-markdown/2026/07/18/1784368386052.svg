<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    @keyframes moveUp {
      0%   { transform: translateY(8px); opacity: 0.4; }
      40%  { opacity: 1; }
      100% { transform: translateY(-8px); opacity: 0.4; }
    }
    .arrow { animation: moveUp 1.2s ease-in-out infinite; }
  </style>
  <path class="arrow" d="M24 36 L24 16 M24 16 L14 26 M24 16 L34 26"
        fill="none" stroke="#3b82f6" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
